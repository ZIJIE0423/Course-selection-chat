<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>我的 · WeOUC</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">W</span> WeOUC</div>
      <nav class="nav">
        <a href="index.html"><span data-icon="chat"></span>对话咨询</a>
        <a href="course.html"><span data-icon="course"></span>课程详情</a>
        <a href="history.html" data-feature="academic_history_import"><span data-icon="history"></span>历史课表</a>
        <a class="active" href="profile.html"><span data-icon="user"></span>我的</a>
      </nav>
      <div class="sidebar-foot">学生资料与培养方案保存在后端，并按用户标识隔离。</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div style="display:flex;gap:10px;align-items:center">
          <button class="icon-btn menu-btn" data-icon="menu" aria-label="菜单"></button>
          <span class="topbar-title">我的</span>
        </div>
        <span class="badge neutral" id="identityState">正在读取身份</span>
      </header>
      <div class="content">
        <section class="card profile-hero">
          <div class="profile-avatar" id="profileAvatar">学</div>
          <div>
            <h1 id="profileTitle" style="font-size:23px;margin:0 0 6px">学生资料</h1>
            <p class="muted" id="profileSummary" style="margin:0">正在从后端读取…</p>
          </div>
        </section>
        <div class="grid grid-2" style="margin-top:18px">
          <section class="card" id="studentProfileCard">
            <div class="card-title">
              <h2>学生信息与培养方案</h2>
              <a class="btn btn-ghost btn-sm" href="onboarding.html">修改信息</a>
            </div>
            <div id="profileContent"><div class="status-line"><span class="spinner"></span>正在读取…</div></div>
          </section>
          <section class="card">
            <div class="card-title">
              <h2>历史课程</h2>
              <a class="btn btn-secondary btn-sm" href="history.html">上传课表</a>
            </div>
            <div id="historySummary"><div class="status-line"><span class="spinner"></span>正在统计…</div></div>
          </section>
          <section class="card">
            <div class="card-title"><h2>Demo 身份映射</h2><span class="badge official">后端请求身份</span></div>
            <div class="meta-list">
              <div class="meta-item"><span>tenant_id</span><strong id="tenantId"></strong></div>
              <div class="meta-item"><span>user_id</span><strong id="userId"></strong></div>
            </div>
            <div class="privacy-note">正式接入小程序时，这两个值应由一次性登录票据换取，不能信任浏览器自行声明。</div>
          </section>
          <section class="card">
            <div class="card-title"><h2>数据使用范围</h2><span class="badge success">最小必要</span></div>
            <p class="muted small" style="line-height:1.8">学生资料用于匹配培养方案；历史课程用于排除已修课程；系统不会获取或保存教务系统密码。</p>
            <a class="btn btn-ghost btn-sm" href="index.html">返回选课咨询</a>
          </section>
        </div>
      </div>
    </main>
  </div>
  <nav class="mobile-nav">
    <a href="index.html"><span data-icon="chat"></span>咨询</a>
    <a href="course.html"><span data-icon="course"></span>课程</a>
    <a href="history.html" data-feature="academic_history_import"><span data-icon="history"></span>历史</a>
    <a class="active" href="profile.html"><span data-icon="user"></span>我的</a>
  </nav>
  <div class="toast"></div>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
