<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>完善学习信息 · WeOUC</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="setup-wrap">
    <section class="setup">
      <aside class="setup-aside">
        <div class="brand" style="padding:0"><span class="brand-mark">W</span> WeOUC</div>
        <h1>让每一次选课，都有据可循</h1>
        <p>学习信息和培养方案会保存到后端，用于后续选课规划。页面不会保存教务系统密码。</p>
        <div class="steps">
          <div class="step active"><span class="step-num">1</span><span>学习信息</span></div>
          <div class="step"><span class="step-num">2</span><span>确认方案</span></div>
          <div class="step"><span class="step-num">3</span><span>开始咨询</span></div>
        </div>
      </aside>
      <div class="setup-main">
        <div class="setup-panel active">
          <div class="eyebrow">学生资料 · 后端保存</div>
          <h2>确认你的学习信息</h2>
          <p class="muted">这些信息用于匹配培养方案，你可以随时在“我的”中修改。</p>
          <div class="form-section">
            <div class="grid grid-2">
              <div class="field">
                <label for="grade">入学年级 *</label>
                <select id="grade" name="grade">
                  <option value="">请选择</option>
                  <option value="2024级">2024级</option>
                  <option value="2023级">2023级</option>
                  <option value="2022级">2022级</option>
                </select>
              </div>
              <div class="field">
                <label for="college">学院 *</label>
                <input id="college" name="college" placeholder="例如：信息科学与工程学部">
              </div>
            </div>
            <div class="field">
              <label for="major">专业 *</label>
              <input id="major" name="major" placeholder="例如：计算机科学与技术">
              <span class="help">系统会根据年级和专业查询当前可用培养方案。</span>
            </div>
            <button class="btn btn-primary" id="matchBtn">匹配培养方案 <span data-icon="arrow"></span></button>
            <div id="profileLoadMessage" aria-live="polite"></div>
          </div>
        </div>

        <div class="setup-panel">
          <div class="eyebrow">匹配完成</div>
          <h2>确认适用的培养方案</h2>
          <p class="muted">系统不会静默绑定，请核对以下信息后确认。</p>
          <div class="field hidden" id="programmeChoiceWrap" style="margin-bottom:14px">
            <label for="programmeChoice">找到多个方案</label>
            <select id="programmeChoice"></select>
          </div>
          <div class="plan-card" id="programmeCard">
            <span class="badge rule">官方规则 / 培养方案</span>
            <h3 id="programmeName">正在读取…</h3>
            <p class="muted small" id="programmeIssuer"></p>
            <div class="meta-list">
              <div class="meta-item"><span>适用专业</span><strong id="programmeMajor"></strong></div>
              <div class="meta-item"><span>适用年级</span><strong id="programmeGrade"></strong></div>
              <div class="meta-item"><span>方案版本</span><strong id="programmeVersion"></strong></div>
              <div class="meta-item"><span>发布日期</span><strong id="programmeDate">未提供</strong></div>
            </div>
          </div>
          <div class="actions" style="margin-top:20px">
            <button class="btn btn-primary" id="confirmPlan">确认并保存到后端</button>
            <button class="btn btn-ghost" data-back-setup>信息不正确</button>
          </div>
          <div id="saveProfileMessage" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>
  <div class="toast"></div>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/setup.js"></script>
</body>
</html>
