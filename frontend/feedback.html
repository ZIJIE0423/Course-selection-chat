<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>分享课程体验 · WeOUC</title><link rel="stylesheet" href="assets/css/styles.css"></head><body><div class="app-shell"><aside class="sidebar"><div class="brand"><span class="brand-mark">W</span> WeOUC</div><nav class="nav"><a href="index.html"><span data-icon="chat"></span>对话咨询</a><a href="course.html"><span data-icon="course"></span>课程详情</a><a class="active" href="feedback.html"><span data-icon="feedback"></span>分享课程体验</a><a href="profile.html"><span data-icon="user"></span>我的</a></nav><div class="sidebar-foot">投稿经审核后才会进入可检索知识库。</div></aside><main class="main"><header class="topbar"><div style="display:flex;gap:10px;align-items:center"><button class="icon-btn menu-btn" data-icon="menu"></button><span class="topbar-title">分享课程体验</span></div><span class="save-note" id="draftNote">草稿已保存</span></header><div class="content"><div class="page-head"><div><div class="eyebrow">结构化反馈</div><h1>让真实体验帮助后来的人</h1><p>仅填写你确实了解的内容。未选择的评价维度不会被自动补全。</p></div><span class="badge neutral">匿名展示已开启</span></div><form class="card form-section" id="feedbackForm"><div class="card-title"><h2>1. 课程与教学对象</h2><span class="muted small">必填课程信息</span></div><div class="grid grid-2"><div class="field"><label>课程 *</label><input name="course" required></div><div class="field"><label>课程号 *</label><input name="code" required></div><div class="field"><label>老师</label><input name="teacher" placeholder="可输入未找到的老师"></div><div class="field"><label>校区</label><select name="campus"><option>崂山校区</option><option>鱼山校区</option><option>西海岸校区</option><option>浮山校区</option></select></div><div class="field"><label>修读学期 *</label><select name="term"><option>2025-2026-2</option><option>2025-2026-1</option><option>2024-2025-2</option></select></div><div class="field"><label>当时年级（可选）</label><select name="thenGrade"><option value="">不填写</option><option>大一</option><option>大二</option><option>大三</option><option>大四</option></select></div></div><div class="divider"></div><div class="card-title"><div><h2>2. 结构化体验</h2><span class="muted small">至少填写一个维度</span></div><div style="width:130px"><div class="progress"><i style="width:42%"></i></div><span class="help">完成度 42%</span></div></div><div class="grid grid-2"><div class="field"><label>作业量</label><select name="workload"><option value="">请选择</option><option>很少</option><option>较少</option><option>适中</option><option>较多</option><option>很多</option></select></div><div class="field"><label>课程难度</label><select name="difficulty"><option value="">请选择</option><option>很轻松</option><option>较轻松</option><option>适中</option><option>较难</option><option>很难</option></select></div><div class="field"><label>课堂节奏</label><select name="pace"><option value="">请选择</option><option>偏慢</option><option>适中</option><option>偏快</option><option>因章节而异</option></select></div><div class="field"><label>主要考核方式</label><select name="exam"><option value="">请选择</option><option>闭卷</option><option>开卷</option><option>论文</option><option>展示</option><option>项目</option><option>平时作业</option></select></div></div><div class="field"><label>推荐给谁</label><textarea name="recommend" placeholder="描述适合的基础、兴趣或学习方式"></textarea></div><div class="field"><label>补充说明</label><textarea name="note" placeholder="请勿包含他人隐私、人身攻击或未经证实的严重指控"></textarea></div><label class="checkline"><input type="checkbox" name="anonymous" checked>匿名展示。匿名只影响前台展示，后台仍保留用于反滥用和申诉处理的匿名身份关联。</label><div class="actions"><button type="button" class="btn btn-primary" id="previewBtn">预览并确认</button><button type="button" class="btn btn-ghost" onclick="toast('草稿已保存')">保存草稿</button></div></form><section class="card hidden" id="previewPanel"><div class="eyebrow">系统整理结果</div><h2>我理解你的反馈是：</h2><div id="previewContent" style="line-height:1.7"></div><div class="divider"></div><label class="checkline"><input type="checkbox" id="truth">我确认以上内容来自本人真实修读或旁听体验，不包含他人隐私、辱骂、人身攻击或未经证实的严重指控。</label><div class="actions" style="margin-top:18px"><button class="btn btn-primary" id="submitFeedback">已理解，确认提交</button><button class="btn btn-ghost" id="backEdit">返回修改</button></div></section><section class="card hidden empty-state" id="successPanel"><div class="empty-icon" data-icon="shield"></div><span class="badge official">审核中</span><h2>投稿已提交审核</h2><p class="muted">投稿编号已生成。内容不会立即公开，审核状态可在“我的投稿”中查看。</p><div class="actions" style="justify-content:center"><a class="btn btn-primary" href="profile.html#submissions">查看我的投稿</a><a class="btn btn-ghost" href="feedback.html">继续分享另一门课程</a><a class="btn btn-ghost" href="course.html">返回课程详情</a></div></section></div></main></div><nav class="mobile-nav"><a href="index.html"><span data-icon="chat"></span>咨询</a><a href="course.html"><span data-icon="course"></span>课程</a><a class="active" href="feedback.html"><span data-icon="feedback"></span>反馈</a><a href="profile.html"><span data-icon="user"></span>我的</a></nav><div class="toast"></div><script src="assets/js/data.js"></script><script src="assets/js/common.js"></script><script src="assets/js/feedback.js"></script></body></html>
