<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>课程详情 · WeOUC</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">W</span> WeOUC</div>
      <nav class="nav">
        <a href="index.html"><span data-icon="chat"></span>对话咨询</a>
        <a class="active" href="course.html"><span data-icon="course"></span>课程详情</a>
        <a href="history.html" data-feature="academic_history_import"><span data-icon="history"></span>历史课表</a>
        <a href="profile.html"><span data-icon="user"></span>我的</a>
      </nav>
      <div class="sidebar-foot">课程详情来自推荐结果对应的活动课程快照，不展示前端模拟数据。</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div style="display:flex;gap:10px;align-items:center">
          <button class="icon-btn menu-btn" data-icon="menu" aria-label="菜单"></button>
          <a class="btn btn-ghost btn-sm" href="index.html">← 返回当前会话</a>
        </div>
        <span class="topbar-title">课程详情</span>
      </header>
      <div class="content">
        <div id="courseLoading"><div class="card"><div class="status-line"><span class="spinner"></span>正在读取课程教学班详情…</div></div></div>
        <div id="courseError" class="hidden"></div>
        <div id="courseDetail" class="hidden">
          <section class="detail-hero">
            <div class="actions"><span class="badge">官方课程快照</span><span class="badge hidden" id="demoBadge">演示样例数据</span></div>
            <h1 id="courseName"></h1>
            <p id="courseCode"></p>
            <div class="stats">
              <div class="stat"><strong id="courseCredits">—</strong><span>学分</span></div>
              <div class="stat"><strong id="courseTeacher">—</strong><span>授课教师</span></div>
              <div class="stat"><strong id="courseCampus">—</strong><span>开课校区</span></div>
              <div class="stat"><strong id="courseSchedule">—</strong><span>上课时间</span></div>
            </div>
          </section>
          <div class="grid grid-2">
            <section class="card">
              <div class="card-title"><h2>官方教学班信息</h2><span class="badge official">实时接口</span></div>
              <div class="meta-list">
                <div class="meta-item"><span>教学班</span><strong id="sectionName">—</strong></div>
                <div class="meta-item"><span>上课地点</span><strong id="courseLocation">—</strong></div>
                <div class="meta-item"><span>课程容量</span><strong id="courseCapacity">—</strong></div>
                <div class="meta-item"><span>当前余量</span><strong id="courseRemaining">—</strong></div>
                <div class="meta-item"><span>数据所属学期</span><strong id="courseSemester">—</strong></div>
                <div class="meta-item"><span>更新时间</span><strong id="courseUpdatedAt">—</strong></div>
              </div>
            </section>
            <section class="card">
              <div class="card-title"><h2>培养方案关系</h2><span class="badge rule">结构化规则</span></div>
              <h3 id="relationshipLabel" style="font-size:16px;margin-bottom:8px"></h3>
              <p class="muted small" id="programmeDescription"></p>
              <div id="historyState" style="margin-top:14px"></div>
            </section>
            <section class="card" style="grid-column:1/-1">
              <div class="card-title"><h2>数据依据</h2><span class="badge official">可追溯</span></div>
              <div class="meta-list">
                <div class="meta-item"><span>课程快照 ID</span><strong id="snapshotId"></strong></div>
                <div class="meta-item"><span>快照生成时间</span><strong id="snapshotGeneratedAt"></strong></div>
              </div>
              <div class="privacy-note">课程安排、教师和余量可能随选课进程变化；关键操作仍以学校教务系统最新数据为准。</div>
            </section>
          </div>
          <div class="actions" style="margin-top:20px">
            <button class="btn btn-primary" id="continueQuestion">继续询问这门课</button>
            <a class="btn btn-ghost" href="index.html">返回推荐结果</a>
          </div>
        </div>
      </div>
    </main>
  </div>
  <nav class="mobile-nav">
    <a href="index.html"><span data-icon="chat"></span>咨询</a>
    <a class="active" href="course.html"><span data-icon="course"></span>课程</a>
    <a href="history.html" data-feature="academic_history_import"><span data-icon="history"></span>历史</a>
    <a href="profile.html"><span data-icon="user"></span>我的</a>
  </nav>
  <div class="toast"></div>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/course.js"></script>
</body>
</html>
